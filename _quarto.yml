project:
  type: website
  execute-dir: project
  render: # Add HERE new chapters (but not the interactive qmd files)
    - index.qmd
    - chapters/chapter1.qmd
    - chapters/chapter2.qmd
    - chapters/chapter3.qmd
    - chapters/chapter4.qmd

website:
  page-navigation: true
  title: "From text to code (WP10) - Hierarchical Text Classification (Cluster 3)"
  # In the two URLs below:
  # - replace AIML4OS by the Github account/organization your repository is hosted by;
  # - replace AIML4OS-template-quarto-r by the name of your repository.
  # If your repo is on the AIML4OS organization, change only the name of the repo.  
  site-url: "https://AIML4OS.github.io//WP10_Cluster3_HierarchicalClassificationModels"
  repo-url: "https://github.com/AIML4OS/WP10_Cluster3_HierarchicalClassificationModels"
  repo-actions: [edit, source, issue]
  # favicon: images/Template2.png
  sidebar:
    logo: resources/profile/main3.png
    style: "docked"
    search: true
    contents: # Add HERE new chapters (but not the interactive qmd files)
      - href: index.qmd
        text: Cluster 3 Report
      - href: chapters/chapter1.qmd
        text: Introduction
      - href: chapters/chapter2.qmd
        text: Case study (methods)
      - href: chapters/chapter3.qmd
        text: Case study (evaluation)
      - href: chapters/chapter4.qmd
        text: Compilation
      - href: chapters/chapter5.qmd
        text: Conclusion

format:
  html:
    theme:
      - cosmo
      - brand
    css: styles.css
    toc: true

filters:
  - export-metadata.lua

